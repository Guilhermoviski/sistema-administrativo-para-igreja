<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projeto bradesco</title>
    <link rel="stylesheet" href="inventario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
    <aside class="sidebar">
        <div class="logo">Sistema Igreja</div>

        <hr class="divisor">
        
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="eventos.html">Eventos</a>
            <a href="membros.html">Membros</a>
            <a href="inventario.html">Inventário</a>
        </nav>
    </aside>
</header>
<main>
    <div class="conteudo">
        <h1>Inventário - Controle de bens e patrimônios da igreja</h1>
        <hr class="divisor2">
    </div>
<section class="statsinicial">
    <article class="card">
        <div class="icon">
            <img src="imgs/inventario/Itens.png" alt="itens">
        </div>
        <div class="info">
            <strong class="numero">320 Itens</strong>
            <span class="descricao">Total</span>
        </div>
    </article>

    <article class="card">
        <div class="icon">
            <img src="imgs/inventario/Uso.png" alt="em uso">
        </div>
        <div class="info">
            <strong class="numero">210 Itens</strong>
            <span class="descricao">Em Uso</span>
        </div>
    </article>

    <article class="card">
        <div class="icon">
            <img src="imgs/inventario/manutenção.png" alt="Manutenção">
        </div>
        <div class="info">
            <strong class="numero">15</strong>
            <span class="descricao">Em Manutenção</span>
        </div>
    </article>

    <article class="card">
        <div class="icon">
            <img src="imgs/inventario/Inativo.png" alt="Inativos">
        </div>
        <div class="info">
            <strong class="numero">12</strong>
            <span class="descricao">Inativos</span>
        </div>
    </article>
</section>

<div class="card-lista">
  <h2>Lista de Itens</h2>

  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Item</th>
        <th>Categoria</th>
        <th>Local</th>
        <th>Qtd</th>
        <th>Estado</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>001</td>
        <td>Microfone</td>
        <td>Som</td>
        <td>Altar</td>
        <td>5</td>
        <td><span class="status bom">Bom</span></td>

        <td class="acoes">
          <button class="editar">✏️</button>
          <button class="excluir">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</main>

</body>
</html>
